          required: false
          schema:
            type: number
            format: double
        - name: lng
          in: query
          description: User's longitude (required for near-me section)
          required: false
          schema:
            type: number
            format: double
        - name: radius
          in: query
          description: Search radius for near-me section (e.g., "25km", "10mi")
          required: false
          schema:
            type: string
            default: "25km"
        - name: min_rating
          in: query
          description: Minimum rating filter for top-rated section (default 4.8)
          required: false
          schema:
            type: number
            format: double
            default: 4.8
      responses:
        "200":
          description: Successful dashboard section data retrieval
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    oneOf:
                      - type: object
                        description: Essential dashboard data with featured categories and previews
