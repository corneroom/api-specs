                            type: array
                            items:
                              $ref: "#/components/schemas/Listing"
                          recent_preview:
                            type: array
                            items:
                              $ref: "#/components/schemas/Listing"
                      - type: array
                        description: Sections config or listing items
                        items:
                          oneOf:
                            - $ref: "#/components/schemas/Listing"
                            - type: object
                      - type: object
                        description: Wrapped listing items for most sections
                        properties:
                          items:
                            type: array
                            items:
                              oneOf:
                                - $ref: "#/components/schemas/Listing"
                                - type: object
                  meta:
                    type: object
                    properties:
                      cache_key:
                        type: string
                      expires_in:
                        type: integer
                      timestamp:
                        type: string
                        format: date-time
