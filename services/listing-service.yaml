  /listings/grouped:
    get:
      summary: Get grouped listings (sample for all groups)
      description: "Returns up to 10 listings for each group: trending, new, nearme, hot, free."
      tags:
        - listing
      operationId: listingsGetGroupedListings
      security: []
      x-google-backend:
        address: https://listing-service-981292602655.us-central1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Grouped listings sample
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      trending:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      new:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      nearme:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      hot:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      free:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      lgbtq_friendly:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      top_rated:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      instant_book:
                        type: array
                        items:
                          $ref: "#/components/schemas/Listing"
                      summary:
                        type: object
                        properties:
                          TrendingCount:
                            type: integer
                          NewCount:
                            type: integer
                          NearMeCount:
                            type: integer
                          HotCount:
                            type: integer
                          FreeCount:
                            type: integer
                          LgbtqFriendlyCount:
                            type: integer
                          TopRatedCount:
                            type: integer
                          InstantBookCount:
                            type: integer
                          groups:
                            type: array
                            items:
                              type: string
                              description: Name of the group (e.g., trending, new, nearme, hot, free, uncategorized)
                            description: List of supported group names for individual fetches (e.g., trending, new, nearme, hot, free, uncategorized)
        "400":
          description: Bad request (invalid parameters)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string

