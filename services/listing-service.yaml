                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        address:
                          type: object
                          properties:
                            street:
                              type: string
                            city:
                              type: string
                            country:
                              type: string
                            postal_code:
                              type: string
                            province:
                              type: string
                            unit_number:
                              type: string
                            flag:
                              type: string
                          required:
                            - street
                            - city
                            - country
                            - postal_code
                        description:
                          type: string
                        place_id:
                          type: string
                      required:
                        - address
                        - description
                        - place_id
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: Total number of suggestions
                    required:
                      - total
                required:
                  - success
                  - data
                  - meta
        "400":
          description: Bad request (invalid query)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "404":
          description: Not found
          content:
            application/json:
