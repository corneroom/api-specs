          required: true
          schema:
            type: string
            enum:
              [
                essential,
                sections-config,
                popular-destinations,
                free,
                near-me,
                lgbtq-friendly,
                top-rated,
                instant-book,
                recently-added,
                community-stories,
              ]
        - name: limit
          in: query
          description: Maximum number of results (default varies by section)
          required: false
          schema:
            type: integer
            format: int32
            default: 8
        - name: offset
          in: query
          description: Offset for pagination (default 0)
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: country
          in: query
          description: Filter by country code (applicable to some sections)
          required: false
          schema:
            type: string
        - name: city
          in: query
          description: Filter by city name (applicable to some sections)
          required: false
          schema:
            type: string
