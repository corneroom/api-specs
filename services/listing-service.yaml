  /listings:
    post:
      description: Create a new listing with full validation. This endpoint is used for publishing final listings and can also be called automatically when a draft listing status changes from 'pending' to 'active' after review approval.
      summary: Create a new listing (publish)
      tags:
        - listing
      operationId: listingsCreateListing
      x-google-backend:
        address: https://listing-service-981292602655.us-central1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      security:
        - jwtAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                  format: double
                thumbnail:
                  type: string
                  format: uri
                max_guests:
                  type: integer
                  format: int32
                instant_book:
                  type: boolean
                accept_same_day_booking:
                  type: boolean
                  description: |
                    Allows same-day bookings (check-in and check-out on same date, different times).
                    Default: false (opt-in model - hosts must explicitly enable).
                photos:
                  type: array
                  items:
                    type: string
                    format: uri
                    minimum: 3
                  maxItems: 10
                host:
                  type: object
                  properties:
                    id:
                      type: string
                amenities:
                  type: array
                  items:
                    type: string
                  maxLength: 20
                house_rules:
                  type: array
                  items:
                    type: string
                  maxLength: 5
                cancellation_policy:
                  type: string
                  enum:
                    - no_refund
                    - fifty_percent_24h
                    - fifty_percent_48h
                    - full_refund_24h
                  description: Cancellation policy code. Default is fifty_percent_24h. Legacy values (No refunds, 50% - 50% refund, 100% - Full Refund) are still accepted for backward compatibility.
                  default: fifty_percent_24h
                address:
                  type: object
                  properties:
                    street:
                      type: string
                    city:
                      type: string
                    country:
                      type: string
                    postal_code:
                      type: string
                    province:
                      type: string
                    unit_number:
                      type: string
                    flag:
                      type: string
                  required:
                    - street
                    - city
                    - country
                    - postal_code
                location:
                  type: object
                  description: Optional client-provided location coordinates. If not provided, the backend will geocode the address. If provided and valid, these coordinates take precedence over geocoding.
                  properties:
                    latitude:
                      type: number
                      format: double
                      description: Latitude coordinate (WGS84)
                    longitude:
                      type: number
                      format: double
                      description: Longitude coordinate (WGS84)
                  required:
                    - latitude
                    - longitude
                baggage_drop:
                  type: boolean
                  description:
                    Baggage drop allowed by host so guests can drop off their bags
                    first while they explore the city.
                  default: false
                category_code:
                  type: string
                  description: Category code from CategoryMeta registry
                  enum:
                    - couchsurf # Sleep – For couches, rooms, or sleeping areas
                    - workspace # Work – For desks, offices, or creative spaces
                    - storage # Store – For holding personal or business items temporarily
                    - bike_rental # Bike Rental – For renting bikes
                    - shower # Shower – For renting shower access
                    - parking # Parking – For renting parking spots
                    - nightlife # Nightlife – For joining tables at bars
                    - meeting_room # Meeting Room – For group discussions or remote calls
                    - kitchen # Kitchen – For cooking or shared meal prep
                    - retail_space # Retail Space – For pop-up shops or selling products
                    - classroom # Classroom – For tutoring or small workshops
                    - lounge # Lounge – For relaxation or informal hangouts
                    - studio # Studio – For creating, filming, or recording
                    - playroom # Playroom – For kids or family-friendly use
                    - charging_station # Charging Station – For power, internet, or work breaks
                    - ride_share # Ride Share – For carpooling or shared rides
                    - cleaning # Cleaning – For cleaning services or supplies
                    - bike_rentals # Bike Rentals – For renting bicycles
                  example: couchsurf

              required:
                - title
                - description
                - price
                - thumbnail
                - max_guests
                - instant_book
                - photos
                - host
                - amenities
                - house_rules
                - cancellation_policy
                - address
                - category_code
        description: The listing to create
        required: true
      responses:
        "201":
          description: The created listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  toast:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                        maxLength: 64
                      description:
                        type: string
                      verified:
                        type: boolean
                        description: Indicates if the listing has been verified
                      deleted_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: Timestamp when listing was soft deleted
                      status:
                        type: string
                        description: Current status of the listing
                        enum:
                          [draft, pending, active, paused, archived, deleted]
                      location:
                        type: object
                        properties:
                          latitude:
                            type: number
                            format: double
                          longitude:
                            type: number
                            format: double
                      price:
                        type: number
                        format: double
                        minimum: 10
                      available:
                        type: boolean
                      thumbnail:
                        type: string
                        format: uri
                      distance:
                        type: number
                        format: double
                      created_at:
                        type: string
                        format: date-time
                      max_guests:
                        type: integer
                        format: int32
                      rating:
                        type: number
                        format: double
                      view_count:
                        type: integer
                        format: int64
                        description: Number of times the listing has been viewed
                      instant_book:
                        type: boolean
                      active:
                        type: boolean
                      amenities:
                        type: array
                        items:
                          type: string
                      cancellation_policy:
                        type: string
                      category:
                        type: object
                      photos:
                        type: array
                        items:
                          type: string
                          format: uri
                      host:
                        type: object
                      house_rules:
                        type: array
                        items:
                          type: string
                      updated_at:
                        type: string
                        format: date-time
                required:
                  - success
                  - data
        "400":
          description: Bad request (invalid listing data)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        default:
          description: Default error response
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
    get:
      summary: Get all listings
      description: Returns listings with optional filters. Supports keyword search, amenities (CSV up to 10), price range, dates, rating, gender, and pagination via limit/offset.
      tags:
        - listing
      operationId: listingsGetAllListings
      security: []
      parameters:
        - name: q
          in: query
          description: Keyword search (title/description)
          required: false
          schema:
            type: string
        - name: latitude
          in: query
          description: Latitude of the user's location
          required: false
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          description: Longitude of the user's location
          required: false
          schema:
            type: number
            format: double
        - name: category
          in: query
          description: Category code from CategoryMeta registry. If provided, must be a valid category code; empty values are rejected with 400.
          required: false
          schema:
            type: string
        - name: country
          in: query
          description: ISO2 country code to filter listings (e.g., CA)
          required: false
          schema:
            type: string
        - name: city
          in: query
          description: City name to filter listings (exact match)
          required: false
          schema:
            type: string
        - name: start_date
          in: query
          description: Start date for availability check (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          description: End date for availability check (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
        - name: price_min
          in: query
          description: Minimum price filter
          required: false
          schema:
            type: number
            format: double
        - name: price_max
          in: query
          description: Maximum price filter
          required: false
          schema:
            type: number
            format: double
        - name: gender
          in: query
          description: Filter by host gender
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (starts at 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Offset for pagination (alternative to page)
          required: false
          schema:
            type: integer
            minimum: 0
      x-google-backend:
        address: https://listing-service-981292602655.us-central1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        "200":
          description: All listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  toast:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        description:
                          type: string
                        verified:
                          type: boolean
                          description: Indicates if the listing has been verified
                        deleted_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Timestamp when listing was soft deleted
                        status:
                          type: string
                          description: Current status of the listing
                          enum:
                            [draft, pending, active, paused, archived, deleted]
                        location:
                          type: object
                          properties:
                            latitude:
                              type: number
                              format: double
                            longitude:
                              type: number
                              format: double
                        price:
                          type: number
                          format: double
                        available:
                          type: boolean
                        thumbnail:
                          type: string
                          format: uri
                        distance:
                          type: number
                          format: double
                        created_at:
                          type: string
                          format: date-time
                        max_guests:
                          type: integer
                          format: int32
                        rating:
                          type: number
                          format: double
                        view_count:
                          type: integer
                          format: int64
                          description: Number of times the listing has been viewed
                        instant_book:
                          type: boolean
                        active:
                          type: boolean
                        amenities:
                          type: array
                          items:
                            type: string
                        cancellation_policy:
                          type: string
                        category:
                          type: object
                          properties:
                            name:
                              type: string
                            code:
                              type: string
                            description:
                              type: string
                  page:
                    type: object
                    properties:
                      page:
                        type: integer
                        description: Current page number
                      limit:
                        type: integer
                        description: Number of items per page
                      total:
                        type: integer
                        description: Total number of items
                      totalPages:
                        type: integer
                        description: Total number of pages
                    required:
                      - page
                      - limit
                      - total
                      - totalPages
                required:
                  - success
                  - data
                  - page
        "400":
          description: Bad request (invalid parameters)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
                  - success
                  - error
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                description: Standard error response model for failed requests.
                properties:
                  success:
                    type: boolean
                    description: Indicates if the request was successful.
                    example: false
                  error:
                    type: string
                    description: Error message describing the failure.
                    example: Invalid booking ID.
                  toast:
                    type: string
                    description: Optional toast message for the client UI.
                    example: Unable to process your request.
                required:
