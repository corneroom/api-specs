servers:
  - url: https://app-staging-gateway-cissa23j.uc.gateway.dev/api/v1
components:
  schemas:
    Listing:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          maxLength: 64
        description:
          type: string
        verified:
          type: boolean
          description: Indicates if the listing has been verified
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when listing was soft deleted
        status:
          type: string
          description: Current status of the listing
          enum: [draft, pending, active, paused, archived, deleted]
        location:
          type: object
          properties:
            latitude:
              type: number
              format: double
            longitude:
              type: number
              format: double
        price:
          type: number
          format: double
        available:
          type: boolean
        thumbnail:
          type: string
          format: uri
        distance:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        max_guests:
          type: integer
          format: int32
        rating:
          type: number
          format: double
        view_count:
          type: integer
          format: int64
          description: Number of times the listing has been viewed
        instant_book:
          type: boolean
        active:
          type: boolean
        amenities:
          type: array
          items:
            type: string
        cancellation_policy:
          type: string
        category:
          type: object
          properties:
            name:
              type: string
            code:
              type: string
            description:
              type: string
        photos:
          type: array
          items:
            type: string
            format: uri
        host:
          type: object
        house_rules:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        accept_same_day_booking:
          type: boolean
          description: |
            Allows same-day bookings (check-in and check-out on same date, different times).
            Default: false (opt-in model).
        pricing_type:
          type: string
          description: |
            Pricing model for the listing. Derived from category if not explicitly set.
          enum: [nightly, daily, slot]
          default: nightly
      required:
        - id
        - title
        - description
        - status
        - location
        - price
        - thumbnail
        - created_at
        - max_guests
        - instant_book
        - amenities
        - cancellation_policy
        - category
        - photos
        - host
        - house_rules
        - updated_at

    ErrorResponse:
      type: object
      description: Standard error response model for failed requests.
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful.
          example: false
        error:
          type: string
          description: Error message describing the failure.
          example: Invalid request parameters.
        toast:
          type: string
          description: Optional toast message for the client UI.
          example: Please check your input and try again.
      required:
        - success
        - error

    LocationSearchResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        country:
          type: string
        country_code:
          type: string
        type:
          type: string
          enum: [city, country, region]
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        popularity_score:
          type: number
          format: double
      required: [id, name, country, country_code, type]

    PopularLocations:
      type: object
      properties:
        destinations:
          type: array
          items:
            $ref: "#/components/schemas/LocationSearchResult"
        countries:
          type: array
          items:
            $ref: "#/components/schemas/LocationSearchResult"
      required: [destinations, countries]

    DetectedLocation:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        country_code:
          type: string
        region:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        accuracy:
          type: string
          enum: [high, medium, low]
        confidence_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
      required: [city, country, country_code, latitude, longitude, accuracy]

    ApiResponseAvailabilityCalendar:
      type: object
      description: Standard API response for listing availability calendar.
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful.
          example: true
        data:
          $ref: "#/components/schemas/AvailabilityCalendar"
        error:
          type: string
          description: Error message if request failed.
          example: ""
        toast:
          type: string
          description: Optional toast message for the client UI.
          example: ""
      required:
        - success
        - data

    AvailabilityCalendar:
      type: object
      description: Listing availability calendar data.
      properties:
        listing_id:
          type: string
          description: Listing ID
          example: "listing123"
        start_date:
          type: string
          format: date
          description: Start date of the availability check
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          description: End date of the availability check
          example: "2024-03-01"
        unavailable_dates:
          type: array
          items:
            type: string
            format: date
          description: List of unavailable dates (YYYY-MM-DD format)
          example: ["2024-01-15", "2024-01-16", "2024-02-10"]
      required:
        - listing_id
        - start_date
        - end_date
        - unavailable_dates

    # ── Experiences product + guides schemas (ported from community-service;
    #    `Location` renamed to `ExperienceLocation` to avoid merged-spec
    #    ambiguity with other services' Location schemas) ──
    ExperienceLocation:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        city:
          type: string
        country:
          type: string
        place_id:
          type: string
        address:
          type: string
      required:
        - latitude
        - longitude
        - city
        - country
    SessionRequest:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
        capacity:
          type: integer
          minimum: 1
      required:
        - start_time
    CreateExperienceRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        location:
          $ref: '#/components/schemas/ExperienceLocation'
        price:
          type: number
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        duration_hours:
          type: integer
          minimum: 1
        duration_minutes:
          type: integer
          minimum: 1
        max_group_size:
          type: integer
          minimum: 1
        category:
          type: string
          description: Category value (food, culture, outdoors, sightseeing, nightlife, wellness, other)
        cover_image_url:
          type: string
          description: Document-service URL for the cover photo (required)
        whats_included:
          type: array
          items:
            type: string
        meeting_point:
          type: string
        end_point:
          type: string
        pricing_mode:
          type: string
          enum: [free, paid]
        cancellation_policy:
          type: string
          enum: [flexible, moderate, strict]
        first_session:
          $ref: '#/components/schemas/SessionRequest'
      required:
        - title
        - description
        - location
        - currency
        - max_group_size
        - category
        - cover_image_url
        - pricing_mode
    UpdateExperienceRequest:
      type: object
      description: >-
        Partial update of an Experience (owner only). Any omitted field is left
        unchanged. Supports the full editable field set so the edit flow can
        persist the whole Experience.
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        price:
          type: number
          minimum: 0
        duration_hours:
          type: integer
          minimum: 1
        duration_minutes:
          type: integer
          minimum: 1
        max_group_size:
          type: integer
          minimum: 1
        available:
          type: boolean
        category:
          type: string
        cover_image_url:
          type: string
        whats_included:
          type: array
          items:
            type: string
        meeting_point:
          type: string
        end_point:
          type: string
        pricing_mode:
          type: string
          enum: [free, paid]
        cancellation_policy:
          type: string
          enum: [flexible, moderate, strict]
        currency:
          type: string
        location:
          $ref: '#/components/schemas/ExperienceLocation'
    ExperienceResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          $ref: '#/components/schemas/ExperienceLocation'
        price:
          type: number
        currency:
          type: string
        duration_hours:
          type: integer
        max_group_size:
          type: integer
        available:
          type: boolean
        likes:
          type: integer
        views:
          type: integer
        bookings:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - location
        - price
        - currency
        - duration_hours
        - max_group_size
        - available
        - likes
        - views
        - bookings
        - created_at
    ExperienceListResponse:
      type: object
      properties:
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/ExperienceResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - experiences
        - pagination
    CreateGuideRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        bio:
          type: string
          maxLength: 500
        avatar:
          type: string
          format: uri
        location:
          $ref: '#/components/schemas/ExperienceLocation'
        languages:
          type: array
          items:
            type: string
        specialties:
          type: array
          items:
            type: string
      required:
        - name
        - bio
        - location
        - languages
        - specialties
    GuideApplyRequest:
      type: object
      properties:
        cities:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
        bio:
          type: string
          maxLength: 500
      required:
        - cities
        - categories
        - bio
    GuideResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        bio:
          type: string
        avatar:
          type: string
        location:
          $ref: '#/components/schemas/ExperienceLocation'
        languages:
          type: array
          items:
            type: string
        specialties:
          type: array
          items:
            type: string
        rating:
          type: number
          format: float
        review_count:
          type: integer
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - bio
        - location
        - languages
        - specialties
        - rating
        - review_count
        - verified
        - created_at
    GuideListResponse:
      type: object
      properties:
        guides:
          type: array
          items:
            $ref: '#/components/schemas/GuideResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - guides
        - pagination
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
      required:
        - page
        - limit
        - total
        - total_pages
        - has_next
        - has_prev
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

