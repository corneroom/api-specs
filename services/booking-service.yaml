openapi: 3.0.0
info:
  title: Project X - Booking Service API
  version: 1.0.0
  description: API specification for Project X Booking Service.
  contact:
    name: project-x-api
    url: https://www.inspiredtech.ca
    email: info@aircouch.com
  termsOfService: https://www.inspiredtech.ca/terms
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

tags:
  - name: booking
    description: Booking operations
  - name: pricing
    description: Pricing and fee calculation operations

servers:
  - url: https://app-staging-gateway-cissa23j.uc.gateway.dev/api/v1

x-google-backend:
  address: https://booking-service-981292602655.us-central1.run.app
  path_translation: APPEND_PATH_TO_ADDRESS

paths:
  /bookings/heartbeat:
    get:
      summary: Heartbeat
      description: Health check endpoint for the booking service.
      tags: [booking]
      operationId: bookingsHeartbeat
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: string
                example: OK
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    # POST /bookings endpoint has been deprecated - use POST /bookings/initiate + PATCH /bookings/{id}/finalize instead
    # The endpoint is kept in the OpenAPI spec for backward compatibility but returns 410 Gone
    post:
      summary: Create a booking (DEPRECATED)
      description: |
        **DEPRECATED**: This endpoint has been deprecated. Please use the two-step booking flow instead:
        1. POST /api/v1/bookings/initiate - Creates a draft booking
        2. PATCH /api/v1/bookings/{id}/finalize - Finalizes the booking with payment intent
        
        This endpoint now returns 410 Gone with a deprecation message.
      tags: [booking]
      operationId: bookingsCreate
      deprecated: true
      security: [{ jwtAuth: [] }]
      requestBody:
        description: Booking request payload
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
      responses:
        "410":
          description: Gone - Endpoint deprecated. Use POST /bookings/initiate + PATCH /bookings/{id}/finalize instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Booking created successfully (legacy response - endpoint is deprecated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: Get all bookings for the authenticated user
      description: Returns bookings for the currently authenticated user ("my bookings").
      tags: [booking]
      operationId: bookingsList
      security: [{ jwtAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Paginated list of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingsSplitResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/host:
    get:
      summary: Get all bookings where the authenticated user is the host
      description: Returns bookings where the currently authenticated user is the host.
      tags: [booking]
      operationId: bookingsHost
      security: [{ jwtAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Paginated list of host bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingsSplitResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/initiate:
    post:
      summary: Initiate a booking (draft)
      description: |
        Creates a draft booking with minimal information. Guest ID is extracted from JWT token.
        Returns a booking ID that can be used to create a payment intent and finalize the booking later.

        For slot-based bookings, provide `slots` array and `slot_date` instead of check_in/check_out.
        The listing must have pricing_type="slot". Amount is calculated as listing.price * number of slots.
      tags: [booking]
      operationId: bookingsInitiate
      security: [{ jwtAuth: [] }]
      requestBody:
        description: Minimal booking initiation payload
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateBookingRequest"
      responses:
        "201":
          description: Draft booking created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/slots:
    get:
      summary: Get slot availability for a listing
      description: |
        Returns available time slots for a listing on a given date. Slots are generated from
        the listing's operating hours (check_in = open, check_out = close) at the specified duration.
        If the requested date is today in the listing's timezone, slots starting less than 1 hour from now are excluded.
        Slots that are already booked (pricing_type="slot") are marked as unavailable.
      tags: [booking]
      operationId: bookingsSlots
      security: [{ jwtAuth: [] }]
      parameters:
        - name: listing_id
          in: query
          required: true
          schema: { type: string }
          description: Listing ID to check slot availability
        - name: date
          in: query
          required: true
          schema: { type: string }
          description: Date to check slot availability (YYYY-MM-DD)
          example: "2026-04-01"
        - name: slot_duration_minutes
          in: query
          required: false
          schema: { type: integer, default: 60 }
          description: Duration of each slot in minutes (default 60). Sent from mobile app via Remote Config.
      responses:
        "200":
          description: Slot availability retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotAvailabilityResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/drafts:
    get:
      summary: Get all draft bookings for user
      description: Retrieve all active draft bookings for the authenticated user. Returns all draft bookings that are not expired and have valid check-in dates, ordered by creation date (most recent first). Limited to 10 most recent drafts.
      tags: [booking]
      operationId: bookingsGetDrafts
      security: [{ jwtAuth: [] }]
      responses:
        "200":
          description: Draft bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBookings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/draft:
    get:
      summary: Get draft booking for listing
      description: Retrieve an existing draft booking for the authenticated user and specified listing. Returns the most recent draft booking if one exists. If no draft exists, returns a successful response with null data.
      tags: [booking]
      operationId: bookingsGetDraft
      security: [{ jwtAuth: [] }]
      parameters:
        - name: listing_id
          in: query
          required: true
          schema: { type: string }
          description: Listing ID to check for draft booking
      responses:
        "200":
          description: Draft booking found or no draft exists (data may be null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      summary: Get a booking by ID
      description: Retrieve a booking by its ID.
      tags: [booking]
      operationId: bookingsGet
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 32 }
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a draft booking
      description: Delete a draft booking by its ID. Only allows deletion of draft bookings owned by the authenticated user.
      tags: [booking]
      operationId: bookingsDelete
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 32 }
      responses:
        "200":
          description: Draft booking deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Draft booking deleted successfully"
        "400":
          description: Bad Request (e.g., booking is not a draft or user doesn't own it)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/cancel:
    patch:
      summary: Cancel a booking
      description: Cancel a booking by its ID.
      tags: [booking]
      operationId: bookingsCancel
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        description: Cancellation request with actor and reason
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "202":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/complete:
    patch:
      summary: Complete a booking
      description: Mark a booking as completed by its ID. Only host or guest can complete.
      tags: [booking]
      operationId: bookingsComplete
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Booking completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/accept:
    patch:
      summary: Accept a booking
      description: Accept a booking by its ID.
      tags: [booking]
      operationId: bookingsAccept
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        description: Optional message to the guest
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required: [message]
      responses:
        "202":
          description: Booking accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/reject:
    patch:
      summary: Reject a booking
      description: Reject a booking by its ID.
      tags: [booking]
      operationId: bookingsReject
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 32 }
      requestBody:
        description: Reason for rejection
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 255
                reason:
                  type: string
                  maxLength: 255
                  enum:
                    - Listing is no longer available
                    - Going on vacation
                    - Traveling for work
                    - Guest is not a good fit
                    - Other
              required: [message, reason]
      responses:
        "202":
          description: Booking rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/finalize:
    patch:
      summary: Finalize a booking
      description: Completes a draft booking with full details and payment intent ID. The payment intent ID is used to verify/charge the payment. Actual payment confirmation happens via Stripe webhook, which will update the booking status accordingly.
      tags: [booking]
      operationId: bookingsFinalize
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        description: Booking finalization payload with full booking details
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeBookingRequest"
      responses:
        "200":
          description: Booking finalized successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/transaction:
    patch:
      summary: Update draft booking with transaction ID
      description: Updates a draft booking with transaction ID from payment-service. This allows the transaction to be restored when the user continues the booking after hot reload.
      tags: [booking]
      operationId: bookingsUpdateTransaction
      security: [{ jwtAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        description: Transaction ID to associate with draft booking (from payment-service CreatePaymentIntent)
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_reference:
                  type: string
                  description: "Provider-specific payment reference (pi_xxx for Stripe, auth code for PayPal, etc.)"
                provider:
                  type: string
                  description: "Payment provider name (stripe, paypal, apple_pay, etc.)"
              required: [payment_reference, provider]
      responses:
        "200":
          description: Booking updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseBooking"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pricing/rates:
    get:
      summary: Get pricing rates for a region
      description: Returns service fee and tax rates for a specific region code
      tags: [pricing]
      operationId: pricingGetRates
      security: []
      parameters:
        - name: region_code
          in: query
          schema: { type: string, default: "US" }
          description: ISO country code (e.g., "US", "CA", "GB")
      responses:
        "200":
          description: Pricing rates retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingRates"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pricing/calculate:
    post:
      summary: Calculate pricing breakdown
      description: Calculates the full pricing breakdown including service fees and taxes
      tags: [pricing]
      operationId: pricingCalculateBreakdown
      security: []
      requestBody:
        description: Pricing calculation request
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingBreakdownRequest"
      responses:
        "200":
          description: Pricing breakdown calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingBreakdown"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: Calculate pricing breakdown from URL parameters
      description: Calculates pricing breakdown using URL query parameters
      tags: [pricing]
      operationId: pricingCalculateBreakdownFromURL
      security: []
      parameters:
        - name: subtotal
          in: query
          required: true
          schema: { type: number, format: float }
          description: Base price before fees and taxes
        - name: region_code
          in: query
          schema: { type: string, default: "US" }
          description: ISO country code
      responses:
        "200":
          description: Pricing breakdown calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingBreakdown"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponseBookings:
      type: object
      description: Standard API response for multiple bookings.
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful.
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
          description: Array of booking objects.
        error:
          type: string
          description: Error message if request failed.
          example: ""
        toast:
          type: string
          description: Optional toast message for the client UI.
          example: "Draft bookings retrieved successfully"
      required:
        - success
        - data

    ApiResponseBooking:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          allOf:
            - $ref: "#/components/schemas/Booking"
          nullable: true
        toast: { type: string, example: "Booking processed successfully." }
        error: { type: string, example: "" }
      required: [success, data]

    Booking:
      type: object
      properties:
        id: { type: string, example: bkg_001 }
        booking_code:
          type: string
          description: Human-friendly booking code (e.g., CR-8J3K2P)
          example: "CR-8J3K2P"
        listing: { $ref: "#/components/schemas/ListingInfo" }
        guest: { $ref: "#/components/schemas/User" }
        host: { $ref: "#/components/schemas/User" }
        check_in: { type: string, format: date-time }
        check_out: { type: string, format: date-time }
        rate: { type: number, format: float, example: 9.99 }
        amount: { type: number, format: float, example: 49.99 }
        total_paid:
          type: number
          format: float
          description: Actual amount captured from Stripe (set when payment succeeds). Use for "Total Paid" display.
          example: 49.99
        currency: { type: string, example: "USD" }
        rating: { type: number, format: float, example: 4.5 }
        days: { type: integer, example: 4 }
        payment_id: { type: string, example: pay_001 }
        transaction_id:
          type: string
          description: Payment-service transaction document ID (links to successful payment)
          example: "txn_abc123"
        payment_reference:
          type: string
          description: "Provider-specific payment reference (pi_xxx for Stripe, auth code for PayPal, etc.)"
          example: "pi_1234567890abcdef"
        payment_provider:
          type: string
          description: "Payment provider name (stripe, paypal, apple_pay, etc.)"
          example: "stripe"
        payment_status:
          type: string
          enum: [pending, authorized, paid, failed, refunded]
          description: Payment status for the booking
          example: "pending"
        status:
          type: string
          enum:
            [
              draft,
              pending,
              accepted,
              rejected,
              cancelled,
              unpaid,
              confirmed,
              completed,
              suspended,
            ]
          description: |
            Booking status lifecycle:
            - draft: Draft booking before payment intent creation
            - pending: Initial status when booking is created/finalized (non-instant, waiting for host)
            - accepted: Payment can proceed (instant booking or host-approved non-instant booking)
            - rejected: Host has declined the booking request
            - cancelled: Booking cancelled by guest or host
            - unpaid: Payment required but not completed (payment failed, canceled, or requires action)
            - confirmed: Payment successful, booking is active
            - completed: Booking period ended, final payment processing triggered
            - suspended: Admin-suspended (temporarily on hold)
          example: draft
        status_text:
          type: string
          description: Localized, human-readable status text for display in UI
          example: "Confirmed"
        guests: { type: integer, example: 2 }
        notes: { type: string, example: "Guest arriving late." }
        rejection_message:
          type: string
          description: Host's message when rejecting the booking
          example: "This booking doesn't work for my schedule."
        rejection_reason:
          type: string
          description: Host's reason for rejecting the booking
          enum:
            [
              "Listing is no longer available",
              "Going on vacation",
              "Traveling for work",
              "Guest is not a good fit",
              "Other"
            ]
          example: "Going on vacation"
        cancelled_by:
          type: string
          description: Who cancelled the booking
          enum: ["GUEST", "HOST", "SYSTEM"]
          example: "GUEST"
        cancellation_reason:
          type: string
          description: Reason for cancellation
          example: "change_of_plans"
        cancelled_at:
          type: string
          format: date-time
          description: When the booking was cancelled
          example: "2025-09-02T12:00:00Z"
        created_at:
          { type: string, format: date-time, example: "2025-09-02T12:00:00Z" }
        time_zone: { type: string, example: "America/New_York" }
        cancellation_policy: { type: string, example: "Flexible" }
        discount_code: { type: string, example: "SUMMER25" }
        # Review tracking fields
        guest_review_listing: 
          type: boolean
          description: Whether the guest has reviewed the listing
        guest_review_host: 
          type: boolean
          description: Whether the guest has reviewed the host
        host_review_guest: 
          type: boolean
          description: Whether the host has reviewed the guest
        review_edit_deadline:
          type: string
          format: date-time
          description: Deadline for editing reviews
        review_create_deadline:
          type: string
          format: date-time
          description: Deadline for submitting reviews
        cancel_after:
          type: string
          format: date-time
          description: Timestamp when pending booking should be auto-cancelled if no host response
          example: "2025-09-02T14:00:00Z"
        can_guest_cancel:
          type: boolean
          description: Whether the guest can cancel this booking (based on check-in date and listing timezone)
          example: true
        can_host_cancel:
          type: boolean
          description: Whether the host can cancel this booking (based on booking status)
          example: true
        pricing_breakdown:
          $ref: "#/components/schemas/PricingBreakdown"
          description: Computed pricing breakdown (subtotal, fees, taxes, total). Present when booking has amount (dates selected).
        display_currency:
          type: string
          description: "Guest's locale currency ISO 4217 code (e.g. \"CAD\"). Only set when different from listing charge currency."
          example: "CAD"
        display_amount:
          type: number
          format: float
          description: "Total converted to guest's display currency at booking time (snapshot)."
          example: 65.99
        exchange_rate:
          type: number
          format: double
          description: "Exchange rate used at booking time: 1 charge_currency = X display_currency."
          example: 1.35
        exchange_rate_date:
          type: string
          description: "Date the exchange rate was sourced (e.g. \"2026-03-20\")."
          example: "2026-03-20"
        # Slot-based booking fields
        pricing_type:
          type: string
          description: "Pricing type for the booking (e.g. \"slot\" for slot-based bookings)"
          example: "slot"
        slot_date:
          type: string

          description: "Date of slot booking (e.g. \"2026-04-01\")"
          example: "2026-04-01"
        slot_start:
          type: string
          description: "First slot start time (e.g. \"09:00\")"
          example: "09:00"
        slot_end:
          type: string
          description: "Last slot end time (e.g. \"12:00\")"
          example: "12:00"
        num_slots:
          type: integer
          description: "Number of slots booked"
          example: 3

      required: [id, listing, guest, host, check_in, check_out]

    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        avatar: { type: string }
        facematch_verified: { type: boolean, description: "Whether user has approved facematch verification" }
      required: [id, name, avatar]

    ListingInfo:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        address: { type: string }
        # Post-booking / private listing fields
        check_in_instructions: { type: string, description: "Instructions for check-in (post-booking)" }
        check_out_instructions: { type: string, description: "Instructions for check-out (post-booking)" }
        wifi_details:
          $ref: "#/components/schemas/WifiDetail"
        emergency_contact: { type: string, description: "Emergency contact information for the listing" }
        local_recommendations: { type: string, description: "Local recommendations and tips for guests" }
        thumbnail: { type: string, example: "https://img.com/listing_123_space.jpg" }
        currency: { type: string, example: "USD" }
        latitude: 
          type: number
          format: float
          nullable: true
          description: Latitude coordinate of the listing location
        longitude:
          type: number
          format: float
          nullable: true
          description: Longitude coordinate of the listing location
        city: { type: string, description: "City where the listing is located" }
        country: { type: string, description: "Country where the listing is located" }
        province: { type: string, description: "Province/state where the listing is located" }
        flag: { type: string, description: "Country flag emoji" }
        category_code: { type: string, description: "Listing category code" }
        category_name: { type: string, description: "Listing category name" }
        timezone: { type: string, example: "America/Toronto", description: "Timezone of the listing location" }
        instant_book: { type: boolean, description: "Whether the listing allows instant booking" }
        base_rate: 
          type: number
          format: float
          description: "Original listing price per night at booking time"
        rating:
          type: number
          format: float
          description: "Listing rating from reviews (updated on review_created)"
      required: [id, title, address, thumbnail]

    WifiDetail:
      type: object
      properties:
        network_name: { type: string }
        password: { type: string }
        notes: { type: string }

    BookingsSplitResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        past:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        pagination:
          type: object
          properties:
            page: { type: integer, example: 1 }
            limit: { type: integer, example: 10 }
            total: { type: integer, example: 25 }
            pages: { type: integer, example: 3 }
          required: [page, limit, total, pages]
        toast:
          type: string
          example: "Bookings fetched"
        error:
          type: string
          example: ""
      required: [success, upcoming, past, pagination]
    BookingRequest:
      type: object
      properties:
        listing_id: { type: string }
        guest_id: { type: string }
        check_in: { type: string, format: date-time }
        check_out: { type: string, format: date-time }
        guests: { type: integer }
        payment_id: { type: string }
        notes: { type: string }
        referral_code: { type: string }
        promo_code: { type: string }
        # Enhanced booking fields
        space_type: 
          type: string
          enum: ["couchsurf", "workspace", "storage", "shower", "parking"]
          description: "Type of space being booked"
        duration_type:
          type: string
          enum: ["hours", "days", "weeks", "minutes"]
          description: "Duration unit for the booking"
        duration_value:
          type: integer
          description: "Duration value (e.g., 2 hours, 3 days, 1 week)"
        deviceInfo:
          type: object
          properties:
            device_id: { type: string }
            device_type: { type: string }
            os_version: { type: string }
            app_version: { type: string }
      required: [listing_id, guest_id, check_in, check_out, guests]

    ErrorResponse:
      type: object
      description: Standard error response model for failed requests.
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful.
          example: false
        error:
          type: string
          description: Error message describing the failure.
          example: Invalid request parameters.
        toast:
          type: string
          description: Optional toast message for the client UI.
          example: Please check your input and try again.
      required:
        - success

    InitiateBookingRequest:
      type: object
      description: Minimal payload to initiate a draft booking. All fields except listing_id are optional to allow progressive booking flow.
      properties:
        listing_id:
          type: string
          description: ID of the listing to book
          example: "lst_123456"
        category:
          type: string
          description: Optional category code for filtering/follow-up purposes
          enum: ["couchsurf", "workspace", "storage", "shower", "parking"]
          example: "couchsurf"
        check_in:
          type: string
          format: date-time
          description: Optional check-in date and time. If provided, will be stored in draft booking.
          example: "2025-09-15T14:00:00Z"
        check_out:
          type: string
          format: date-time
          description: Optional check-out date and time. If provided, will be stored in draft booking.
          example: "2025-09-18T11:00:00Z"
        guests:
          type: integer
          minimum: 1
          description: Optional number of guests. If provided, will be stored in draft booking.
          example: 2
        notes:
          type: string
          description: Optional message from guest to host. If provided, will be stored in draft booking.
          example: "Hi, I'm looking forward to staying at your place! I have a couple of questions about parking."
        slots:
          type: array
          description: Optional array of time slots for slot-based bookings. When provided with slot_date, creates a slot booking.
          items:
            type: object
            properties:
              start: { type: string, example: "09:00", description: "Slot start time (HH:MM)" }
              end: { type: string, example: "10:00", description: "Slot end time (HH:MM)" }
            required: [start, end]
        slot_date:
          type: string

          description: Date for slot-based booking (YYYY-MM-DD). Required when slots are provided.
          example: "2026-04-01"
      required:
        - listing_id

    FinalizeBookingRequest:
      type: object
      description: Full booking details to finalize a draft booking
      properties:
        check_in:
          type: string
          format: date-time
          description: Check-in date and time
          example: "2025-09-15T14:00:00Z"
        check_out:
          type: string
          format: date-time
          description: Check-out date and time
          example: "2025-09-18T11:00:00Z"
        guests:
          type: integer
          minimum: 1
          description: Number of guests
          example: 2
        payment_reference:
          type: string
          description: "Provider-specific payment reference (pi_xxx for Stripe, auth code for PayPal, etc.)"
          example: "pi_1234567890abcdef"
        provider:
          type: string
          description: "Payment provider name (stripe, paypal, apple_pay, etc.)"
          example: "stripe"
        notes:
          type: string
          description: Optional notes for the booking
          example: "Arriving late, will be there around 6 PM"
        display_currency:
          type: string
          description: "Guest's preferred display currency ISO 4217 code (e.g. \"CAD\")."
          example: "CAD"
        amount:
          type: number
          format: double
          description: Optional amount for reconciliation safeguard, particularly for slot-based bookings. Backend can verify this matches the calculated pricing.
          example: 50.00
      required:
        - check_in
        - check_out
        - guests
        - payment_reference
        - provider

    GuestCancellationReason:
      type: string
      description: Reason code for guest-initiated cancellations
      enum:
        - change_of_plans
        - accidental_booking
        - travel_issue
        - price_or_payment_issue
        - health_or_emergency
        - other
      example: change_of_plans

    HostCancellationReason:
      type: string
      description: Reason code for host-initiated cancellations
      enum:
        - guest_asked_to_cancel
        - guest_no_show
        - guest_payment_issue
        - property_issue
        - host_schedule_issue
        - safety_or_comfort_concern
        - other
      example: guest_asked_to_cancel

    CancelBookingRequest:
      type: object
      description: Request body for cancelling a booking
      properties:
        actor:
          type: string
          enum: [guest, host]
          description: Who is cancelling the booking
          example: guest
        reason:
          oneOf:
            - $ref: "#/components/schemas/GuestCancellationReason"
            - $ref: "#/components/schemas/HostCancellationReason"
          description: Cancellation reason code (must match actor type)
          example: change_of_plans
        reason_label:
          type: string
          description: Human-readable reason label for push notifications (e.g. "I can no longer afford this trip"). Optional; when omitted, notifications may show the code or omit the reason.
          example: "I can no longer afford this trip"
      required:
        - actor
        - reason

    # Pricing schemas
    PricingRates:
      type: object
      description: Pricing rates for a specific region
      properties:
        service_fee_rate:
          type: number
          format: float
          description: Service fee rate as decimal (0.10 = 10%)
          example: 0.10
        tax_rate:
          type: number
          format: float
          description: Tax rate as decimal (0.08 = 8%)
          example: 0.08
      required:
        - service_fee_rate
        - tax_rate

    PricingBreakdownRequest:
      type: object
      description: Request for pricing calculation
      properties:
        subtotal:
          type: number
          format: float
          description: Base price before fees and taxes
          example: 100.00
        region_code:
          type: string
          description: ISO country code for regional pricing
          default: "US"
          example: "CA"
      required:
        - subtotal

    PricingBreakdown:
      type: object
      description: Complete pricing breakdown with fees and taxes
      properties:
        subtotal:
          type: number
          format: float
          description: Base price before fees
          example: 100.00
        service_fee:
          type: number
          format: float
          description: Service fee amount
          example: 10.00
        taxes:
          type: number
          format: float
          description: Tax amount
          example: 8.00
        total:
          type: number
          format: float
          description: Total amount including all fees
          example: 118.00
        service_fee_rate:
          type: number
          format: float
          description: Service fee rate used in calculation
          example: 0.10
        tax_rate:
          type: number
          format: float
          description: Tax rate used in calculation
          example: 0.08
        platform_fee_rationale:
          type: string
          description: Localized explanation for platform fee. Present when service_fee > 0.
          example: "We charge a small fee to keep the platform running and support hosts & guests."
        free_listing_fee_note:
          type: string
          description: Localized note for free-listing platform fee. Present when subtotal = 0 and service_fee > 0.
          example: "Even for free stays, a small platform fee applies to cover operations."
        currency:
          type: string
          description: ISO 4217 currency code (e.g. usd, vnd, eur) for display. Present when attached to a booking.
          example: "vnd"
      required:
        - subtotal
        - service_fee
        - taxes
        - total
        - service_fee_rate
        - tax_rate

    SlotAvailabilityResponse:
      type: object
      description: Response for slot availability query
      properties:
        date:
          type: string

          description: The requested date
          example: "2026-04-01"
        slot_duration_minutes:
          type: integer
          description: Duration of each slot in minutes
          example: 60
        listing_id:
          type: string
          description: The listing ID
          example: "abc123"
        slots:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
                description: Slot start time (HH:MM)
                example: "09:00"
              end:
                type: string
                description: Slot end time (HH:MM)
                example: "10:00"
              available:
                type: boolean
                description: Whether the slot is available for booking
                example: true
            required: [start, end, available]
      required: [date, slot_duration_minutes, listing_id, slots]
